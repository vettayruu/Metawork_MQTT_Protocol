http {
    include       mime.types;
    default_type  application/octet-stream;

    # 基础性能优化
    sendfile           on;
    tcp_nopush         on; # 减少网络报文段数量
    tcp_nodelay        on; # 禁止 Nagle 算法，实现实时传输（关键！）
    keepalive_timeout  65;

    # 1. 强制 HTTP 跳转 HTTPS (可选，建议开启)
    server {
        listen       80;
        server_name  localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen       443 ssl default_server;
        server_name  liust.local localhost 127.0.0.1;

        # 证书路径
        ssl_certificate      "C:/Program Files/mosquitto/cert.pem";
        ssl_certificate_key  "C:/Program Files/mosquitto/key.pem";

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

